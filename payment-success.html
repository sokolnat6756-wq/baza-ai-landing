<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FAF8F4" />
  <title>Оплата прошла успешно — База ИИ</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23FF3D77'/%3E%3Cstop offset='0.5' stop-color='%23A974FF'/%3E%3Cstop offset='1' stop-color='%232F7DFF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='9' fill='url(%23g)'/%3E%3Ccircle cx='16' cy='15' r='5' fill='white' opacity='0.9'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="legal.css" />
</head>
<body class="legal-page">

  <header class="legal-header">
    <div class="container legal-header__inner">
      <a href="index.html" class="logo" aria-label="База ИИ — на главную">
        <span class="logo__mark" aria-hidden="true"></span>
        <span class="logo__text">База&nbsp;ИИ</span>
      </a>
    </div>
  </header>

  <main class="legal-main">
    <div class="container container--legal">
      <a href="index.html" class="legal-back">← Вернуться на сайт</a>
      <h1 class="legal-title">Оплата прошла успешно</h1>
      <article class="legal-content payment-result">
        <p>Спасибо! Мы получили вашу оплату.</p>
        <p id="paymentSuccessOrder" class="payment-result__meta" hidden></p>
        <p>Инструкции по доступу к материалам придут на email, который вы указали при оплате. Если письма нет — проверьте папку «Спам» или напишите нам: <a href="mailto:Y-kopasova@inbox.ru">Y-kopasova@inbox.ru</a>.</p>
        <p class="payment-result__actions"><a href="index.html#pricing" class="btn btn--primary btn--lg">На главную</a></p>
      </article>
    </div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var orderId = params.get("orderId");
      var el = document.getElementById("paymentSuccessOrder");
      if (orderId && el) {
        el.textContent = "Номер заказа: " + orderId;
        el.hidden = false;
      }
    })();
  </script>
</body>
</html>
