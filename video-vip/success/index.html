<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FAF8F4" />
  <title>Оплата прошла успешно — VIP-сопровождение</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23FFB347'/%3E%3Cstop offset='1' stop-color='%23FF8C00'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='9' fill='url(%23g)'/%3E%3Ccircle cx='16' cy='15' r='5' fill='white' opacity='0.9'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAF8F4;
      --card: #FFFFFF;
      --text: #1D1D1F;
      --text-2: #5F6470;
      --gold-dark: #B45309;
      --gold-soft: #FFF7ED;
      --border: rgba(217, 119, 6, 0.14);
      --shadow: 0 24px 60px rgba(180, 83, 9, 0.12), 0 8px 24px rgba(29, 29, 31, 0.06);
      --radius: 24px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Manrope", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(80% 60% at 10% 0%, rgba(255, 179, 71, 0.18), transparent 55%),
        radial-gradient(70% 50% at 100% 100%, rgba(255, 140, 0, 0.10), transparent 60%),
        var(--bg);
      line-height: 1.65;
      min-height: 100vh;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: clamp(24px, 5vw, 48px) 20px 56px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 15px;
      color: var(--text);
      text-decoration: none;
      margin-bottom: clamp(28px, 5vw, 40px);
    }

    .logo__mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, #FFB347, #FF8C00);
      box-shadow: 0 6px 16px rgba(217, 119, 6, 0.25);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(28px, 5vw, 40px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #FFB347, #FF8C00, #D97706);
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gold-soft);
      color: var(--gold-dark);
      font-size: 28px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(24px, 4.5vw, 32px);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0 0 16px;
      font-size: 16px;
      color: var(--text-2);
    }

    p:last-of-type { margin-bottom: 0; }

    a {
      color: var(--gold-dark);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .meta {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(217, 119, 6, 0.12);
      font-size: 14px;
      color: var(--text-2);
    }
  </style>
</head>
<body>
  <div class="page">
    <a href="../../index.html" class="logo" aria-label="База ИИ — на главную">
      <span class="logo__mark" aria-hidden="true"></span>
      <span>База&nbsp;ИИ</span>
    </a>

    <article class="card">
      <div class="icon" aria-hidden="true">✓</div>

      <h1>Спасибо за оплату VIP-сопровождения!</h1>

      <p>Мы отправили письмо с доступом на указанный email.<br />Проверьте входящие и папку «Спам».</p>

      <p>
        Если возникнут вопросы, напишите Юлии:<br />
        <a href="mailto:Y-kopasova@inbox.ru">Y-kopasova@inbox.ru</a>
      </p>

      <p>
        или в отдел заботы Digital Izba:<br />
        <a href="https://t.me/digital_izba" target="_blank" rel="noopener">@digital_izba</a>
      </p>

      <p class="meta" id="orderMeta" hidden></p>
    </article>
  </div>

  <script>
    (function () {
      var orderId = new URLSearchParams(window.location.search).get("orderId");
      var meta = document.getElementById("orderMeta");
      if (orderId && meta) {
        meta.textContent = "Номер заказа: " + orderId;
        meta.hidden = false;
      }
    })();
  </script>
</body>
</html>
